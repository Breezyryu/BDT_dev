<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="260" viewBox="0 0 1040 260" font-family="Malgun Gothic, 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#1F3A6B"/>
    </marker>
    <marker id="arrR" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#B1351B"/>
    </marker>
  </defs>

  <text x="520" y="32" font-size="18" font-weight="700" text-anchor="middle" fill="#1A1A1A">dV/dQ 스무딩 3중 파이프라인</text>

  <!-- Step 0: Raw -->
  <rect x="20" y="80" width="130" height="100" rx="8" fill="#F4F6FA" stroke="#888" stroke-width="1.2"/>
  <text x="85" y="112" font-size="14" font-weight="600" text-anchor="middle" fill="#333">Raw dV/dQ</text>
  <text x="85" y="134" font-size="11" text-anchor="middle" fill="#555">수치미분</text>
  <text x="85" y="154" font-size="10" text-anchor="middle" fill="#888">(noisy)</text>
  <line x1="152" y1="130" x2="190" y2="130" stroke="#1F3A6B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 1: Median -->
  <rect x="195" y="80" width="180" height="100" rx="8" fill="#DCE8F7" stroke="#1F3A6B" stroke-width="1.5"/>
  <text x="285" y="110" font-size="14" font-weight="700" text-anchor="middle" fill="#1F3A6B">① 시간대별 중앙값</text>
  <text x="285" y="134" font-size="11" text-anchor="middle" fill="#333">Time-bin median</text>
  <text x="285" y="154" font-size="11" text-anchor="middle" fill="#333">데이터 밀림 해소</text>
  <line x1="377" y1="130" x2="413" y2="130" stroke="#1F3A6B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 2: Wavelet -->
  <rect x="420" y="80" width="180" height="100" rx="8" fill="#DCE8F7" stroke="#1F3A6B" stroke-width="1.5"/>
  <text x="510" y="110" font-size="14" font-weight="700" text-anchor="middle" fill="#1F3A6B">② Wavelet Denoising</text>
  <text x="510" y="134" font-size="11" text-anchor="middle" fill="#333">고주파 노이즈 제거</text>
  <text x="510" y="154" font-size="11" text-anchor="middle" fill="#333">Peak 정보 보존</text>
  <line x1="602" y1="130" x2="638" y2="130" stroke="#1F3A6B" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 3: Savitzky-Golay -->
  <rect x="645" y="80" width="180" height="100" rx="8" fill="#DCE8F7" stroke="#1F3A6B" stroke-width="1.5"/>
  <text x="735" y="110" font-size="14" font-weight="700" text-anchor="middle" fill="#1F3A6B">③ Savitzky-Golay</text>
  <text x="735" y="134" font-size="11" text-anchor="middle" fill="#333">다항식 기반 평활</text>
  <text x="735" y="154" font-size="11" text-anchor="middle" fill="#333">Peak 형상 유지</text>
  <line x1="827" y1="130" x2="865" y2="130" stroke="#B1351B" stroke-width="2.5" marker-end="url(#arrR)"/>

  <!-- Output: Peak -->
  <rect x="870" y="80" width="150" height="100" rx="8" fill="#FCE7DF" stroke="#B1351B" stroke-width="1.5"/>
  <text x="945" y="115" font-size="14" font-weight="700" text-anchor="middle" fill="#B1351B">Peak Point</text>
  <text x="945" y="138" font-size="11" text-anchor="middle" fill="#B1351B">자동 산출</text>
  <text x="945" y="158" font-size="10" text-anchor="middle" fill="#8C2A13">(SOC · Voltage)</text>

  <!-- Footnote -->
  <text x="520" y="220" font-size="12" text-anchor="middle" fill="#555">적용 대상  —  Gen4 / Gen4+Si 실측 dV/dQ  ·  POR (급방전 이슈) 셀 0.2C 방전 프로파일</text>
</svg>
